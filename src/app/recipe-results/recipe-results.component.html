<main class="results">
  <header class="results__brand">
    <app-header-cream-logo></app-header-cream-logo>
  </header>

  <section class="results__content" *ngIf="workflowStatus$ | async as status">
    <div *ngIf="status === 'loading'" class="results__loader">
      <div class="spinner" aria-hidden="true"></div>
      <p>Creating your dishes based on the selected preferences...</p>
    </div>

    <ng-container *ngIf="status === 'success'">

      <article class="header__article">
        <h1>Generated recipes</h1>
        <img src="assets/img/recipe-results/Visual.svg" alt="">
        <p>We took what you have and let our AI do the thinking. Here are 3 easy recipes you can make right now!</p>
        <div class="choosen__elements">
          <button>Italian<!-- id of choosen Cuisine --></button>
          <button>Quick<!-- id of choosen Cooking time --></button>
        </div>
      </article>

      <section class="summery-card__section">
        <article class="summary-card" *ngFor="let recipe of recipeSummaries$ | async; trackBy: trackByIndex">
          <div class="summary-card__body">
            <div class="summary-card__header">
              <img src="assets/img/recipe-results/ring.svg" alt="">
              <span class="summary-card__label">Recipe {{ recipe.order }}</span>
            </div>

            <h2>{{ recipe.title }}</h2>
            <div class="summary-card__meta">
              <img src="assets/img/choose-your-preferences/time.svg" alt="" aria-hidden="true" />
              <span>Cooking time: {{ recipe.cookingTimeMinutes }}min</span>
            </div>
          </div>
          <button type="button" class="summary-card__action" (click)="viewRecipe(recipe.id)">View</button>
        </article>
      </section>

      <div class="results__actions">
        <button type="button" (click)="startOver()">Start another request <img
            src="assets/img/recipe-results/Arrow 18.svg" alt=""></button>
      </div>
    </ng-container>
  </section>
</main>
