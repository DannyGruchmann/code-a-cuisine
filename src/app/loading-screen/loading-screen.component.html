<main class="loading-screen">
  <header class="loading-screen__brand">
    <app-header-cream-logo></app-header-cream-logo>
  </header>

  <section class="loading-screen__content">
    <div class="loading-screen__animation" aria-hidden="true">
      <lottie-player
        class="loading-screen__lottie"
        src="assets/animations/animation.json"
        background="transparent"
        speed="1"
        loop
        autoplay
        aria-hidden="true"
      ></lottie-player>
    </div>
    <p class="loading-screen__text">
      Generating
      <span class="loading-screen__dots" aria-hidden="true">
        <span>.</span><span>.</span><span>.</span>
      </span>
    </p>
  </section>
</main>
